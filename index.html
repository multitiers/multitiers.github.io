<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTC TIERS</title>
<link rel="icon" type="image/png" href="backgroundsword.png">
<style>
@font-face { font-family: 'MultiCraftFont'; src: url('MultiCraftFont.ttf') format('truetype'); }
:root {
    --bg: #010102; --purple: #a855f7; --purple-glow: rgba(168, 85, 247, 0.9);
    --border: rgba(168, 85, 247, 0.4); --gold: #ffd700; --gold-glow: rgba(255, 215, 0, 0.6); --grey: #888;
    --na-color: #3498db; --eu-color: #ff4d4d; --sa-color: #00ff88; --oc-color: #ff00ff; --as-color: #ff8800;
}
body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-size: 0.9rem; }

/* SWEEP ANIMATION */
.sweep-bg { position: fixed; inset: 0; z-index: -10; background: linear-gradient(110deg, transparent 40%, rgba(168, 85, 247, 0.15) 50%, transparent 60%); background-size: 250% 100%; animation: shineSweep 8s infinite linear; pointer-events: none; }
@keyframes shineSweep { 0% { background-position: 250% 0; } 100% { background-position: -250% 0; } }

header { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 25px; position: relative; z-index: 10; }
.title-sword { width: 45px; margin-bottom: 10px; animation: swordPulse 2s infinite ease-in-out; filter: drop-shadow(0 0 10px var(--purple)); }
.main-title { font-family: 'MultiCraftFont'; font-size: 2.8rem; color: #fff; text-shadow: 0 0 10px var(--purple); margin: 0; }
@keyframes swordPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); filter: drop-shadow(0 0 25px var(--purple-glow)); } }

nav { display: flex; justify-content: center; align-items: center; padding: 10px 40px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--border); width: 100%; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); margin-top: 55px; box-sizing: border-box; }
.nav-center { display: flex; gap: 25px; position: absolute; left: 50%; transform: translateX(-50%); }
.nav-link { color: #555; font-family: 'MultiCraftFont'; font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
.nav-link.active { color: #fff; text-shadow: 0 0 15px var(--purple); }

.search-wrap { margin-left: auto; width: 210px; position: relative; }
#playerSearch { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 5px; color: #fff; padding: 8px; font-family: 'MultiCraftFont'; font-size: 0.65rem; outline: none; }
#searchPopup { position: absolute; top: 110%; left: 0; width: 100%; background: #050508; border: 1px solid var(--purple); border-radius: 5px; display: none; z-index: 500; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
.search-item { padding: 8px 12px; cursor: pointer; font-family: 'MultiCraftFont'; font-size: 0.6rem; transition: 0.2s; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
.search-item:hover { background: #111; }

#displayList { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0 100px 0; }
.tier-card { background: #050508; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; transition: 0.3s; padding: 15px; width: 650px; position: relative; }
.clickable { cursor: pointer; }
.clickable:hover { border-color: var(--purple); box-shadow: 0 0 12px var(--purple-glow); transform: translateY(-2px); }

/* TAGS & DEVICE HOVER */
.tag-wrap { position: relative; display: inline-block; margin-right: 5px; }
.tag { font-family: 'MultiCraftFont'; font-size: 0.55rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #444; display: inline-block; }
.tag-popup { position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid var(--purple); padding: 5px 10px; font-size: 0.55rem; border-radius: 4px; white-space: nowrap; visibility: hidden; opacity: 0; transition: 0.2s; z-index: 1000; color: #fff; font-family: 'MultiCraftFont'; }
.tag-wrap:hover .tag-popup { visibility: visible; opacity: 1; }

.reg-na { color: var(--na-color); border-color: var(--na-color); }
.reg-eu { color: var(--eu-color); border-color: var(--eu-color); }
.reg-sa { color: var(--sa-color); border-color: var(--sa-color); }
.reg-oc { color: var(--oc-color); border-color: var(--oc-color); }
.reg-as { color: var(--as-color); border-color: var(--as-color); }
.dev-mk { color: #00ffff; border-color: #00ffff; }
.dev-mb { color: #ff7f50; border-color: #ff7f50; }

/* MODAL TOOLTIP HOVER */
.p-kit-item { position: relative; display: flex; flex-direction: column; align-items: center; width: 85px; }
.p-kit-circle { width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; background: #000; transition: 0.3s; cursor: help; }
.p-kit-circle img { width: 28px; height: 28px; }

.kit-popup { position: absolute; bottom: 105%; left: 50%; transform: translateX(-50%) translateY(5px); background: #000; border: 1px solid var(--purple); border-radius: 6px; padding: 10px; opacity: 0; visibility: hidden; transition: 0.2s; z-index: 3000; font-family: 'MultiCraftFont'; font-size: 0.6rem; text-align: center; box-shadow: 0 0 15px var(--purple-glow); line-height: 1.4; }
.p-kit-item:hover .kit-popup { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
.modal-content { background: #010102; border: 2px solid var(--purple); border-radius: 12px; padding: 30px; width: 440px; text-align: center; }

#kitBar { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; width: 90%; }
.kit-btn { background: #000; border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; color: #666; cursor: pointer; font-family: 'MultiCraftFont'; font-size: 0.65rem; }
.kit-btn.active { color: #fff; border-color: var(--purple); box-shadow: 0 0 12px var(--purple); }
</style>
</head>
<body>
<div class="sweep-bg"></div>
<header><img src="backgroundsword.png" class="title-sword"><h1 class="main-title">MTC TIERS</h1></header>

<nav>
    <div class="nav-center">
        <div id="nav-rankings" class="nav-link active" onclick="switchTab('rankings')">RANKINGS</div>
        <div id="nav-hof" class="nav-link" onclick="switchTab('hof')">HALL OF FAME</div>
        <div id="nav-testers" class="nav-link" onclick="switchTab('testers')">TIER TESTERS</div>
    </div>
    <div class="search-wrap"><input type="text" id="playerSearch" placeholder="SEARCH PLAYER..." oninput="handleSearch(this.value)"><div id="searchPopup"></div></div>
</nav>

<div id="viewLabel" style="font-family:'MultiCraftFont'; font-size:1.2rem; color:var(--gold); margin:25px 0;">OVERALL</div>
<div id="kitBar"></div>
<div id="displayList"></div>

<div id="profileModal" class="modal-overlay" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="pRank" style="font-family:'MultiCraftFont'; color:var(--purple); font-size:0.7rem;">RANK #--</div>
        <h2 id="pName" style="font-family:'MultiCraftFont'; color:#fff; margin:10px 0; font-size: 1.8rem;">Player</h2>
        <div id="pMeta" style="margin-bottom: 15px;"></div>
        <div id="pPoints" style="color:var(--gold); font-family:'MultiCraftFont'; font-size:1.4rem; margin-bottom:20px;">0 PTS</div>
        <div id="pTiers" style="display:flex; flex-wrap:wrap; justify-content:center; gap:18px; border-top:1px solid #222; padding-top:20px;"></div>
    </div>
</div>

<script>
let DATA = {};
let CURRENT_TAB = 'rankings';
let CURRENT_KIT = 'Overall';
const KIT_MAP = { "Overall": "", "Emerald": "emerald.png", "Emerald KB": "emerald_kb.png", "Emerald OA": "emerald_oa.png", "Dragonhide KB": "dragonhide_kb.png", "Dragonhide KB OA": "kb_oa.png", "Wand": "wand.png", "Diamond": "diamond.png" };

const REG_MAP = { "NA": "North America", "EU": "Europe", "SA": "South America", "OC": "Oceania", "AS": "Asia" };
const DEV_MAP = { "MK": "Mouse & Keyboard", "MB": "Mobile", "CT": "Controller", "TP": "Touch" };

function getTags(name) {
    const p = DATA.Players?.find(x => x.name === name) || {region:"NA", device:"MK"};
    return `<div style="margin-top:5px;">
        <div class="tag-wrap"><span class="tag reg-${p.region.toLowerCase()}">${p.region}</span><div class="tag-popup">${REG_MAP[p.region]}</div></div>
        <div class="tag-wrap"><span class="tag dev-${p.device.toLowerCase()}">${p.device}</span><div class="tag-popup">${DEV_MAP[p.device]}</div></div>
    </div>`;
}

async function load() {
    const r = await fetch(`https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/rankings.json?v=${Date.now()}`);
    DATA = await r.json();
    let totals = {};
    const PTS = { "HT1":50, "LT1":40, "HT2":30, "LT2":20, "HT3":12, "LT3":8, "HT4":5, "LT4":3, "HT5":2, "LT5":1 };
    for(let k in DATA) if(k!=="Players") for(let t in DATA[k]) DATA[k][t].forEach(p => totals[p] = (totals[p]||0) + (PTS[t.replace('R','')]||0));
    DATA["Overall"] = totals;
    buildKitBar();
    render("Overall");
}

function buildKitBar() {
    const bar = document.getElementById('kitBar'); bar.innerHTML = "";
    Object.keys(KIT_MAP).forEach(k => {
        const btn = document.createElement('button');
        btn.className = `kit-btn ${k==='Overall'?'active':''}`;
        btn.innerHTML = (KIT_MAP[k] ? `<img src="${KIT_MAP[k]}" style="width:16px; margin-right:5px;"> ` : "") + k.toUpperCase();
        btn.onclick = () => { if(CURRENT_TAB === 'rankings') { document.querySelectorAll('.kit-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); CURRENT_KIT = k; render(k); }};
        bar.appendChild(btn);
    });
}

function render(kit) {
    if(CURRENT_TAB !== 'rankings') return;
    document.getElementById('viewLabel').innerText = kit.toUpperCase();
    const out = document.getElementById('displayList'); out.innerHTML = "";
    
    if(kit !== "Overall" && (!DATA[kit] || Object.keys(DATA[kit]).length === 0)) {
        out.innerHTML = `<h2 style="font-family:'MultiCraftFont'; color:#444; margin-top:50px;">NO RANKED PLAYERS</h2>`;
        return;
    }

    if(kit === "Overall") {
        Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]).forEach(([name, pts], i) => {
            out.innerHTML += `<div class="tier-card clickable" onclick="openProfile('${name}')"><div style="display:flex; justify-content:space-between; align-items:center;"><div><b style="color:var(--purple); margin-right:15px; font-size:1rem;">#${i+1}</b><span style="font-weight:bold; font-size:1rem;">${name}</span>${getTags(name)}</div><b style="color:var(--gold); font-size:1rem;">${pts} PTS</b></div></div>`;
        });
    } else {
        const grid = document.createElement('div'); grid.style.display="flex"; grid.style.gap="20px"; grid.style.flexWrap="wrap"; grid.style.justifyContent="center";
        ["T1","T2","T3","T4","T5"].forEach(lvl => {
            let col = `<div style="min-width:200px;"><div style="color:var(--purple); border-bottom:1px solid var(--border); margin-bottom:10px; text-align:center; font-family:'MultiCraftFont'; font-size:0.9rem;">${lvl}</div>`;
            let has = false;
            for(let t in DATA[kit]) if(t.includes(lvl)) DATA[kit][t].forEach(name => {
                has = true; const isR = t.startsWith('R');
                col += `<div class="tier-card clickable" style="width:200px; padding:12px;" onclick="openProfile('${name}')"><span style="font-size:0.9rem; font-weight:bold;">${name}</span>${getTags(name)}<div style="font-size:0.6rem; color:${isR?'var(--grey)':'var(--gold)'}; margin-top:5px; font-weight:bold;">${isR?'Retired '+t.slice(1):t}</div></div>`;
            });
            if(has) { col += `</div>`; grid.innerHTML += col; }
        });
        out.appendChild(grid);
    }
}

async function switchTab(tab) {
    CURRENT_TAB = tab;
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + tab).classList.add('active');
    const out = document.getElementById('displayList'), kb = document.getElementById('kitBar'), lb = document.getElementById('viewLabel');
    out.innerHTML = "";
    if(tab === 'rankings') { kb.style.display="flex"; render(CURRENT_KIT); }
    else {
        kb.style.display="none"; lb.innerText = tab === 'hof' ? "HALL OF FAME" : "TIER TESTERS";
        const r = await fetch(`https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/${tab}.json?v=${Date.now()}`);
        const data = await r.json();
        data.forEach(i => {
            const hasProf = DATA.Overall[i.name];
            out.innerHTML += `<div class="tier-card ${hasProf?'clickable':''}" ${hasProf?`onclick="openProfile('${i.name}')"`:''}>
                <b style="color:var(--purple); font-family:'MultiCraftFont'; font-size:1rem;">${i.name}</b>
                ${i.discord ? `<div style="color:var(--purple); font-size:0.85rem; font-weight:bold; margin-top:5px;">Discord: ${i.discord}</div>`:''}
                <p style="font-size:0.75rem; color:#bbb; margin-top:8px;">${i.description || ''}</p>
            </div>`;
        });
    }
}

function openProfile(name) {
    if(!DATA.Overall[name]) return;
    const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
    const rankIdx = sorted.findIndex(x => x[0] === name);
    document.getElementById('pRank').innerText = "RANK #" + (rankIdx + 1);
    document.getElementById('pName').innerText = name;
    document.getElementById('pMeta').innerHTML = getTags(name);
    document.getElementById('pPoints').innerText = DATA.Overall[name] + " PTS";
    let grid = "";
    for(let k in DATA) if(k!=="Overall" && k!=="Players") for(let t in DATA[k]) if(DATA[k][t].includes(name)) {
        const isR = t.startsWith('R');
        const color = isR ? 'var(--grey)' : 'var(--gold)';
        const display = isR ? 'Retired ' + t.substring(1) : t;
        const expanded = display.replace('HT', 'High Tier ').replace('LT', 'Low Tier ');
        grid += `<div class="p-kit-item">
            <div class="kit-popup" style="border-color:${color}"><span style="color:${color}">${expanded}</span><br><span style="color:#666">${k}</span></div>
            <div class="p-kit-circle" style="border-color:${color}">${KIT_MAP[k]?`<img src="${KIT_MAP[k]}">`:''}</div>
            <div style="font-size:0.6rem; color:${color}; font-weight:bold; margin-top:5px;">${display}</div>
        </div>`;
    }
    document.getElementById('pTiers').innerHTML = grid;
    document.getElementById('profileModal').style.display = 'flex';
}

function handleSearch(val) {
    const pop = document.getElementById('searchPopup');
    if(!val) { pop.style.display = 'none'; return; }
    const matches = Object.keys(DATA.Overall).filter(n => n.toLowerCase().includes(val.toLowerCase())).slice(0, 5);
    pop.innerHTML = matches.map(m => `<div class="search-item" onclick="openProfile('${m}'); pop.style.display='none';"><b>${m}</b> <span style="color:var(--purple); font-size:0.5rem;">VIEW PROFILE</span></div>`).join('') || "";
    pop.style.display = matches.length ? 'block' : 'none';
}

load();
document.addEventListener('click', (e) => { if(!e.target.closest('.search-wrap')) document.getElementById('searchPopup').style.display = 'none'; });
</script>
</body>
</html>
