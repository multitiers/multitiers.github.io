<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC TIERS</title>
    <link rel="stylesheet" href="css.css?v=400">
</head>
<body>
    <div class="sweep-bg"></div>
    
    <nav>
        <div class="nav-center">
            <div id="nav-rankings" class="nav-link active" onclick="switchTab('rankings')">RANKINGS</div>
            <div id="nav-hof" class="nav-link" onclick="switchTab('hof')">HALL OF FAME</div>
            <div id="nav-testers" class="nav-link" onclick="switchTab('testers')">TIER TESTERS</div>
        </div>
        <div class="search-wrap">
            <input type="text" id="playerSearch" placeholder="SEARCH PLAYER..." oninput="handleSearch(this.value)">
            <div id="searchPopup"></div>
        </div>
    </nav>

    <div id="viewLabel" style="text-align:center; color:var(--gold); margin: 20px 0; font-size: 1.5rem;">OVERALL</div>
    <div id="kitBar" style="display:flex; justify-content:center; gap:10px; margin-bottom:30px;"></div>
    <div id="displayList" style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;"></div>

    <div id="profileModal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="pRank" style="color:var(--purple); font-size:0.9rem;">RANK #--</div>
            <h2 id="pName" style="font-size: 2.5rem; margin: 15px 0;">Player</h2>
            <div id="pMeta" style="margin-bottom: 20px;"></div>
            <div id="pPoints" style="color:var(--gold); font-size:1.8rem; margin-bottom:20px;">0 PTS</div>
            <div id="pTiers" style="display:flex; flex-wrap:wrap; justify-content:center; border-top: 1px solid #333; padding-top: 20px;"></div>
        </div>
    </div>

<script>
const ASSETS = "assets/";
const KIT_MAP = { "Overall": "", "Emerald": "emerald.png", "Emerald KB": "emerald_kb.png", "Emerald OA": "emerald_oa.png", "Dragonhide KB": "dragonhide_kb.png", "Dragonhide KB OA": "kb_oa.png", "Wand": "wand.png", "Diamond": "diamond.png" };
const REGIONS = { "NA": "North America", "EU": "Europe", "RS": "Russia", "OC": "Oceania", "AF": "Africa", "SA": "South America", "AS": "Asia" };
const DEVICES = { "MK": "Mouse & Keyboard", "TP": "Touchpad", "MB": "Mobile", "CT": "Controller" };

let DATA = { Kits: {}, Players: [], Overall: {} };
let currentKit = "Overall";

// ... (fetch logic remains same as your previous working version) ...

function openProfile(name) {
    if(!DATA.Overall[name]) return;
    const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
    document.getElementById('pRank').innerText = "RANK #" + (sorted.findIndex(x => x[0] === name) + 1);
    document.getElementById('pName').innerText = name;
    document.getElementById('pMeta').innerHTML = getTags(name, true);
    document.getElementById('pPoints').innerText = DATA.Overall[name] + " PTS";
    
    let grid = "";
    for(let k in DATA.Kits) {
        for(let t in DATA.Kits[k]) {
            if(DATA.Kits[k][t].includes(name)) {
                const ct = t.startsWith('R') ? t.substring(1) : t;
                // FIXED: Using the kit-popup class for hover instead of static labels
                grid += `
                <div class="p-kit-item">
                    <div class="kit-popup">
                        <div style="font-size:0.7rem; color:#888;">${k}</div>
                        <div style="font-size:0.9rem; color:var(--gold);">${ct}</div>
                    </div>
                    <div class="p-kit-circle">
                        <img src="${ASSETS}${KIT_MAP[k]}" style="width:40px;">
                    </div>
                    <div style="font-size:0.8rem; color:var(--gold);">${ct}</div>
                </div>`;
            }
        }
    }
    document.getElementById('pTiers').innerHTML = grid;
    document.getElementById('profileModal').style.display = 'flex';
}

// ... (Rest of buildKitBar and render logic) ...
</script>
</body>
</html>
