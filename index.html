<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC TIERS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mtctiers/mtctiers.github.io@main/css.css?v=180">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/assets/backgroundsword.png">

    <style>
        @font-face {
            font-family: 'MultiCraftFont';
            src: url('MultiCraftFont.tff') format('truetype');
        }

        body, button, input, div, span, h1, h2, b {
            font-family: 'MultiCraftFont', sans-serif !important;
        }

        .modal-content { 
            max-width: 350px !important; 
            padding: 15px !important; 
            border: 2px solid var(--purple) !important; 
            background: rgba(0,0,0,0.95) !important;
        }
        
        .p-kit-circle { 
            width: 50px; height: 50px; border: 2px solid var(--gold); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            background: transparent !important; margin-bottom: 5px; 
        }

        .p-kit-item { position: relative; display: inline-flex; flex-direction: column; align-items: center; width: 70px; margin-top: 15px; }
        
        .kit-popup {
            position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%) translateY(5px);
            background: #000; border: 1px solid var(--gold); padding: 6px 10px; border-radius: 4px;
            text-align: center; opacity: 0; visibility: hidden; transition: 0.1s;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); z-index: 1000; white-space: nowrap;
        }
        .p-kit-item:hover .kit-popup { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .popup-kit-name { color: #888; font-size: 0.6rem; display: block; }
        .popup-tier-name { color: var(--gold); font-size: 0.85rem; font-weight: bold; display: block; }

        .tag:hover::after {
            content: attr(data-title); position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; padding: 4px 8px; font-size: 0.6rem; border: 1px solid var(--gold);
            border-radius: 4px; white-space: nowrap; z-index: 1001;
        }

        .tester-discord { color: #7289da; font-size: 0.85rem; margin-top: 4px; }
        .empty-msg { color: var(--gold); font-size: 1.4rem; margin-top: 60px; text-align: center; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="sweep-bg"></div>
<header><img src="https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/assets/backgroundsword.png" class="title-sword"><h1 class="main-title">MTC TIERS</h1></header>

<nav>
    <div class="nav-center">
        <div id="nav-rankings" class="nav-link active" onclick="switchTab('rankings')">RANKINGS</div>
        <div id="nav-hof" class="nav-link" onclick="switchTab('hof')">HALL OF FAME</div>
        <div id="nav-testers" class="nav-link" onclick="switchTab('testers')">TIER TESTERS</div>
    </div>
    <div class="search-wrap">
        <input type="text" id="playerSearch" placeholder="SEARCH PLAYER..." oninput="handleSearch(this.value)">
        <div id="searchPopup"></div>
    </div>
</nav>

<div id="viewLabel" style="font-size:1.2rem; color:var(--gold); margin:25px 0;">OVERALL</div>
<div id="kitBar"></div>
<div id="displayList"></div>

<div id="profileModal" class="modal-overlay" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="pRank" style="color:var(--purple); font-size:0.7rem;">RANK #--</div>
        <h2 id="pName" style="color:#fff; margin:10px 0; font-size: 1.6rem;">Player</h2>
        <div id="pMeta" style="display:flex; gap:6px; justify-content:center; margin-bottom: 12px;"></div>
        <div id="pPoints" style="color:var(--gold); font-size:1.2rem; margin-bottom:15px;">0 PTS</div>
        <div id="pTiers" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px; border-top:1px solid #333; padding-top:15px;"></div>
    </div>
</div>

<script>
const DATA_PATH = "https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/data/";
const ASSETS = "https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/assets/";
const KIT_MAP = { "Overall": "", "Emerald": "emerald.png", "Emerald KB": "emerald_kb.png", "Emerald OA": "emerald_oa.png", "Dragonhide KB": "dragonhide_kb.png", "Dragonhide KB OA": "kb_oa.png", "Wand": "wand.png", "Diamond": "diamond.png" };
const REGIONS = { "NA": "North America", "EU": "Europe", "AS": "Asia", "OC": "Oceania", "AF": "Africa", "SA": "South America" };
const DEVICES = { "MK": "Mouse & Keyboard", "TP": "Touchpad", "CT": "Controller", "MB": "Mobile" };

let DATA = { Rankings: {}, HOF: [], Testers: [], Players: [], Overall: {} };

async function load() {
    try {
        const fetchJson = (n) => fetch(`${DATA_PATH}${n}.json?v=${Date.now()}`).then(r => r.json());
        const [r, p, h, t] = await Promise.all([
            fetchJson('rankings'), fetchJson('players').catch(()=>[]),
            fetchJson('hof').catch(()=>[]), fetchJson('testers').catch(()=>[])
        ]);
        
        // Correcting for the "Rankings" top-level key in your JSON
        DATA.Rankings = r.Rankings || r; 
        DATA.Players = p; DATA.HOF = h; DATA.Testers = t;
        
        calculateOverall();
        buildKitBar();
        render("Overall");
    } catch(e) { console.error("Data Load Error:", e); }
}

function calculateOverall() {
    let totals = {};
    const PTS = { "HT1":50, "LT1":40, "HT2":30, "LT2":20, "HT3":12, "LT3":8, "HT4":5, "LT4":3, "HT5":2, "LT5":1 };
    for(let k in DATA.Rankings) {
        if(k === "Overall") continue; 
        for(let t in DATA.Rankings[k]) {
            DATA.Rankings[k][t].forEach(name => {
                const tier = t.replace('R','');
                totals[name] = (totals[name]||0) + (PTS[tier]||0);
            });
        }
    }
    DATA.Overall = totals;
}

function getTags(name, centered = false) {
    const p = DATA.Players?.find(x => x.name === name);
    if(!p) return "";
    return `<div style="display:flex; gap:6px; ${centered ? 'justify-content:center;' : ''}">
        <span class="tag reg-${p.region.toLowerCase()}" data-title="${REGIONS[p.region]||p.region}">${p.region}</span>
        <span class="tag dev-${p.device.toLowerCase()}" data-title="${DEVICES[p.device]||p.device}">${p.device}</span>
    </div>`;
}

function render(kit) {
    const out = document.getElementById('displayList'); out.innerHTML = "";
    document.getElementById('viewLabel').innerText = kit.toUpperCase();
    
    if(kit === "Overall") {
        const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
        if(sorted.length === 0) { out.innerHTML = `<div class="empty-msg">NO RANKED PLAYERS</div>`; return; }
        sorted.forEach(([name, pts], i) => {
            out.innerHTML += `<div class="tier-card clickable" onclick="openProfile('${name}')">
                <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                    <div><b style="color:var(--purple); font-size:0.7rem;">#${i+1}</b> <span style="font-size:1.1rem;">${name}</span>${getTags(name)}</div>
                    <b style="color:var(--gold);">${pts} PTS</b>
                </div>
            </div>`;
        });
    } else {
        const kitData = DATA.Rankings[kit];
        if(!kitData || Object.keys(kitData).length === 0) {
            out.innerHTML = `<div class="empty-msg">NO RANKED PLAYERS</div>`; return;
        }
        const grid = document.createElement('div'); grid.style.display="flex"; grid.style.gap="15px"; grid.style.flexWrap="wrap"; grid.style.justifyContent="center";
        ["T1","T2","T3","T4","T5"].forEach(lvl => {
            let col = `<div style="min-width:180px;"><div class="tier-header">${lvl}</div>`;
            let has = false;
            for(let t in kitData) {
                if(t.includes(lvl)) {
                    kitData[t].forEach(name => {
                        has = true;
                        col += `<div class="tier-card clickable" onclick="openProfile('${name}')" style="text-align:center; margin-bottom:10px;">
                            <div style="font-weight:bold;">${name}</div>${getTags(name, true)}
                            <div style="font-size:0.65rem; color:var(--gold); margin-top:4px;">${t}</div>
                        </div>`;
                    });
                }
            }
            if(has) { col += `</div>`; grid.innerHTML += col; }
        });
        out.appendChild(grid);
    }
}

function openProfile(name) {
    if(!DATA.Overall[name]) return;
    const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
    document.getElementById('pRank').innerText = "RANK #" + (sorted.findIndex(x => x[0] === name) + 1);
    document.getElementById('pName').innerText = name;
    document.getElementById('pMeta').innerHTML = getTags(name, true);
    document.getElementById('pPoints').innerText = DATA.Overall[name] + " PTS";
    let grid = "";
    for(let k in DATA.Rankings) {
        if(k === "Overall") continue;
        for(let t in DATA.Rankings[k]) {
            if(DATA.Rankings[k][t].includes(name)) {
                const ct = t.startsWith('R') ? t.substring(1) : t;
                grid += `<div class="p-kit-item">
                    <div class="kit-popup"><span class="popup-kit-name">${k}</span><span class="popup-tier-name">${ct}</span></div>
                    <div class="p-kit-circle"><img src="${ASSETS}${KIT_MAP[k]}"></div><div style="font-size:0.65rem; color:var(--gold);">${ct}</div>
                </div>`;
            }
        }
    }
    document.getElementById('pTiers').innerHTML = grid;
    document.getElementById('profileModal').style.display = 'flex';
}

function switchTab(tab) {
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + tab).classList.add('active');
    const out = document.getElementById('displayList');
    document.getElementById('kitBar').style.display = tab === 'rankings' ? "flex" : "none";
    document.getElementById('viewLabel').innerText = tab === 'rankings' ? "OVERALL" : (tab === 'hof' ? "HALL OF FAME" : "TIER TESTERS");
    out.innerHTML = "";
    
    if(tab === 'rankings') render("Overall");
    else if(tab === 'hof') {
        DATA.HOF.forEach(p => {
            const hasProfile = DATA.Overall[p.name];
            out.innerHTML += `<div class="tier-card ${hasProfile ? 'clickable' : ''}" ${hasProfile ? `onclick="openProfile('${p.name}')"` : ''}>
                <div style="font-size:1.2rem; color:var(--gold);">${p.name}</div>
                <div class="hof-desc">${p.description}</div>
            </div>`;
        });
    } else {
        DATA.Testers.forEach(p => {
            out.innerHTML += `<div class="tier-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-size:1.1rem;">${p.name}</div>
                    <div class="tester-discord">Discord: ${p.discord}</div>
                </div>
            </div>`;
        });
    }
}

function buildKitBar() {
    const bar = document.getElementById('kitBar'); bar.innerHTML = "";
    Object.keys(KIT_MAP).forEach(k => {
        const btn = document.createElement('button');
        btn.className = `kit-btn ${k==='Overall'?'active':''}`;
        btn.innerHTML = (KIT_MAP[k] ? `<img src="${ASSETS}${KIT_MAP[k]}" style="width:16px; margin-right:5px;"> ` : "") + k.toUpperCase();
        btn.onclick = () => { 
            document.querySelectorAll('.kit-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); render(k); 
        };
        bar.appendChild(btn);
    });
}

function handleSearch(val) {
    const pop = document.getElementById('searchPopup');
    if(!val) { pop.style.display = 'none'; return; }
    const matches = Object.keys(DATA.Overall).filter(n => n.toLowerCase().includes(val.toLowerCase())).slice(0, 5);
    pop.innerHTML = matches.map(m => `<div class="search-item" onclick="openProfile('${m}'); pop.style.display='none';"><b>${m}</b></div>`).join('');
    pop.style.display = matches.length ? 'block' : 'none';
}

window.onload = load;
</script>
</body>
</html>
