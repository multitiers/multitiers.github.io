<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC TIERS</title>
    <link rel="stylesheet" href="https://mtctiers.github.io/style.css">
</head>
<body>

<div class="sweep-bg"></div>

<header style="margin-top: 60px;">
    <img src="https://mtctiers.github.io/backgroundsword.png" style="width: 40px; filter: drop-shadow(0 0 5px var(--purple));">
    <h1 class="main-title" style="font-family:'MultiCraftFont'; color:#fff; font-size: 2.2rem; margin: 10px 0;">MTC TIERS</h1>
</header>

<nav>
    <div class="nav-links-container">
        <div id="nav-rankings" class="nav-link active" onclick="switchTab('rankings')">RANKINGS</div>
        <div id="nav-hof" class="nav-link" onclick="switchTab('hof')">HALL OF FAME</div>
        <div id="nav-testers" class="nav-link" onclick="switchTab('testers')">TIER TESTERS</div>
    </div>
    
    <div class="search-area">
        <input type="text" id="playerSearch" class="search-box" placeholder="SEARCH..." oninput="handleSearch(this.value)">
        <span onclick="toggleSearch()" style="cursor:pointer; color:var(--purple); font-size: 1.1rem; font-family:'MultiCraftFont';">🔍</span>
        <div id="searchPopup" style="position:absolute; top:70px; right:20px; background:#000; border:1px solid var(--purple); display:none; z-index:110; width:150px;"></div>
    </div>
</nav>

<div id="viewLabel" style="font-family:'MultiCraftFont'; color:var(--gold); margin:25px; text-align:center; font-size: 1.1rem;">OVERALL</div>
<div id="kitBar"></div>
<div id="displayList"></div>

<div class="info-btn" onclick="openInfo()">i</div>

<div id="infoModal" class="modal-overlay" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="font-family:'MultiCraftFont'; color:var(--purple); margin-top:0;">INFORMATION</h2>
        <div id="infoBody" style="font-size: 0.85rem; line-height: 1.6;"></div>
    </div>
</div>

<script>
const BASE = "https://mtctiers.github.io/";

const CONFIG = {
    kits: { 
        "Overall": { img: null },
        "Emerald": { img: "emerald.png" },
        "Emerald KB": { img: "emerald_kb.png" },
        "Emerald OA": { img: "emerald_oa.png" },
        "Dragonhide KB": { img: "dragonhide_kb.png" },
        "Dragonhide KB OA": { img: "kb_oa.png" },
        "Wand": { img: "wand.png" },
        "Diamond": { img: "diamond.png" }
    },
    regions: { 
        "NA": { label: "North America", color: "#3498db" }, "EU": { label: "Europe", color: "#e74c3c" }, 
        "SA": { label: "South America", color: "#2ecc71" }, "OC": { label: "Oceania", color: "#f1c40f" }, 
        "AS": { label: "Asia", color: "#e67e22" }
    },
    devices: { 
        "MK": { label: "Mouse & Keyboard", color: "#00ffff" }, "TP": { label: "Touchpad", color: "#ff00aa" }, 
        "CT": { label: "Controller", color: "#5dade2" }, "MB": { label: "Mobile", color: "#ff7f50" } 
    },
    points: { "HT1":50, "LT1":40, "HT2":30, "LT2":20, "HT3":12, "LT3":8, "HT4":5, "LT4":3, "HT5":2, "LT5":1 },
    infoContent: `
        <b style="color:var(--gold);">POINT VALUES:</b>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; font-size:0.75rem; margin-top:10px; color:#bbb;">
            <div>HT1: 50 Points</div><div>LT1: 40 Points</div>
            <div>HT2: 30 Points</div><div>LT2: 20 Points</div>
            <div>HT3: 12 Points</div><div>LT3: 8 Points</div>
            <div>HT4: 5 Points</div><div>LT4: 3 Points</div>
            <div>HT5: 2 Points</div><div>LT5: 1 Point</div>
        </div>`
};

let DATA = {};
let CURRENT_TAB = 'rankings';
let CURRENT_KIT = 'Overall';

function toggleSearch() {
    const el = document.getElementById('playerSearch');
    el.classList.toggle('open');
    if(el.classList.contains('open')) el.focus();
}

async function load() {
    try {
        const r = await fetch(`${BASE}rankings.json?v=${Date.now()}`);
        DATA = await r.json();
        let totals = {};
        for(let k in DATA) {
            if(k !== "Overall" && k !== "Players") {
                for(let t in DATA[k]) {
                    DATA[k][t].forEach(p => {
                        const score = CONFIG.points[t.replace('R','')] || 0;
                        totals[p] = (totals[p] || 0) + score;
                    });
                }
            }
        }
        DATA["Overall"] = totals;
        buildKitBar();
        render("Overall");
    } catch(e) { console.error(e); }
}

function buildKitBar() {
    const bar = document.getElementById('kitBar'); bar.innerHTML = "";
    Object.keys(CONFIG.kits).forEach(k => {
        const btn = document.createElement('button');
        btn.className = `kit-btn ${k === 'Overall' ? 'overall-btn' : ''} ${k === CURRENT_KIT ? 'active' : ''}`;
        btn.innerText = k.toUpperCase();
        btn.onclick = () => { CURRENT_KIT = k; render(k); };
        bar.appendChild(btn);
    });
}

function render(kit) {
    const out = document.getElementById('displayList'); out.innerHTML = "";
    document.getElementById('viewLabel').innerText = kit.toUpperCase();

    if(kit === "Overall") {
        Object.entries(DATA.Overall).sort((a,b) => b[1] - a[1]).forEach(([name, pts], i) => {
            out.innerHTML += `
                <div class="tier-card">
                    <b style="color:var(--purple); font-size:1.1rem;">#${i+1} ${name}</b><br>
                    <span style="color:var(--gold); font-family:'MultiCraftFont'; font-size:0.8rem;">${pts} Points</span>
                </div>`;
        });
    } else {
        const kitImg = CONFIG.kits[kit].img ? `<div class="img-container"><img src="${BASE}${CONFIG.kits[kit].img}"></div>` : '';
        out.innerHTML = `<div class="tier-card">${kitImg}<h3 style="font-family:'MultiCraftFont'; margin:0;">${kit} Rankings</h3></div>`;
        // Rest of tiered list logic would go here
    }
}

function openInfo() { 
    document.getElementById('infoBody').innerHTML = CONFIG.infoContent; 
    document.getElementById('infoModal').style.display = 'flex'; 
}

load();
</script>
</body>
</html>
